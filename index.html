<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIG Barcelos Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="map-overlay-header">
        <div class="header-content">
            <img src="https://w7.pngwing.com/pngs/464/735/png-transparent-barcelos-portugal-portuguese-cuisine-chicken-rooster-caldeirada-rooster-animals-galliformes-bird-thumbnail.png" alt="Galo" class="map-logo">
            <h1 id="mainTitle">MUNICÍPIO DE BARCELOS</h1>
        </div>
    </header>

    <aside class="controls">
        <h3 style="color: #ff8c1a; font-size: 14px; letter-spacing: 1px; margin-bottom: 15px;">DADOS GEOGRÁFICOS</h3>
        
        <button type="button" id="btnCargarGeoJSON" class="map-button">CARREGAR MAPA</button>

        <div class="separator"></div>

        <label>SELECIONAR FREGUESIA
            <select id="labelSelect">
                <option value="">Aguardando dados...</option>
            </select>
        </label>

        <div id="infoBox" class="info-card">
            <p id="detailNome">Selecione ou clique num polígono</p>
            <p id="detailTaxa"></p>
        </div>
    </aside>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
