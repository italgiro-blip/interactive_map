<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIG Barcelos | Análise Geográfica Avançada</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="map-overlay-header">
        <div class="header-content">
            <img src="https://w7.pngwing.com/pngs/464/735/png-transparent-barcelos-portugal-portuguese-cuisine-chicken-rooster-caldeirada-rooster-animals-galliformes-bird-thumbnail.png" alt="Galo" class="map-logo">
            <h1 id="mainTitle">MUNICÍPIO DE BARCELOS</h1>
        </div>
    </header>

    <aside class="controls">
        <h3 style="color: #ff8c1a; font-size: 14px; letter-spacing: 1px; margin-bottom: 15px;">CONFIGURAÇÕES</h3>
        
        <button type="button" id="btnCargarGeoJSON" class="map-button">CARREGAR DADOS</button>

        <div class="separator"></div>

        <label>MÉTODO ESTATÍSTICO
            <select id="classificationSelect">
                <option value="jenks" selected>Quebras Naturais (Jenks)</option>
                <option value="equal">Intervalos Iguais</option>
                <option value="quartiles">Quartis (25% cada)</option>
            </select>
        </label>

        <label>ESQUEMA DE CORES
            <select id="paletteSelect">
                <option value="orange" selected>Laranja</option>
                <option value="viridis">Viridis</option>
                <option value="magma">Magma</option>
                <option value="greens">Natureza</option>
                <option value="blues">Oceano</option>
            </select>
        </label>

        <label>SELECIONAR FREGUESIA
            <select id="labelSelect">
                <option value="">Aguardando dados...</option>
            </select>
        </label>

        <div id="infoBox" class="info-card">
            <p id="detailNome"><b>Nome:</b> --</p>
            <p id="detailTaxa"><b>Taxa:</b> --</p>
        </div>
    </aside>

    <div class="side-images">
        <img src="https://www.heraldicacivica.pt/images/armas/bcl.gif" alt="Escudo" class="side-image">
        <img src="https://www.crwflags.com/fotw/images/p/pt-bcl.gif" alt="Bandeira" class="side-image">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
